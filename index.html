<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Color Picker from Image</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;

  /* 🌈 Background */
  background: linear-gradient(135deg, #1e3c72, #2a5298, #6dd5ed);
  min-height: 100vh;
  margin: 0;
  padding: 20px;
  color: white;
}

h1 {
  color: white;
  text-shadow: 2px 2px 5px rgba(0,0,0,0.4);
}

input {
  margin-top: 10px;
}

canvas {
  margin-top: 20px;
  border: 3px solid white;
  cursor: crosshair;
  max-width: 90%;
  box-shadow: 0px 4px 15px rgba(0,0,0,0.4);
}

.result-box {
  margin-top: 20px;
  display: inline-block;
  padding: 15px;
  background: rgba(255,255,255,0.15);
  border-radius: 12px;
  backdrop-filter: blur(10px);
  box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
  color: white;
}

#colorBox {
  width: 120px;
  height: 120px;
  margin: 10px auto;
  border: 3px solid white;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  background: #ffffff;
  color: #000;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #ddd;
}

#info {
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🎨 Color Picker from Image</h1>

<input type="file" id="upload" accept="image/*">

<br>

<canvas id="canvas"></canvas>

<div class="result-box">
  <div id="colorBox"></div>
  <div id="info">Upload image and click on it</div>
  <button onclick="copyColor()">Copy HEX</button>
</div>

<script>
const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const colorBox = document.getElementById("colorBox");
const info = document.getElementById("info");

let img = new Image();
let currentHex = "#000000";

// IMAGE UPLOAD
upload.addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event){
    img = new Image();

    img.onload = function(){
      canvas.width = img.width;
      canvas.height = img.height;

      ctx.drawImage(img, 0, 0);
    }

    img.src = event.target.result;
  }

  reader.readAsDataURL(file);
});

// CLICK COLOR PICK
canvas.addEventListener("click", function(e){

  const rect = canvas.getBoundingClientRect();

  const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
  const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));

  const pixel = ctx.getImageData(x, y, 1, 1).data;

  const r = pixel[0];
  const g = pixel[1];
  const b = pixel[2];

  const hex = rgbToHex(r, g, b);
  currentHex = hex;

  colorBox.style.background = hex;

  info.innerHTML =
    "HEX: " + hex + "<br>" +
    "RGB: rgb(" + r + "," + g + "," + b + ")";
});

// COPY FUNCTION
function copyColor(){
  navigator.clipboard.writeText(currentHex);
  alert("Copied: " + currentHex);
}

// RGB TO HEX
function rgbToHex(r,g,b){
  return "#" + [r,g,b].map(x => x.toString(16).padStart(2,"0")).join("");
}
</script>

</body>
</html>
